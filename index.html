// Build grid buttons
const grid = document.getElementById('grid');
DATA.forEach(t => {
  const b = document.createElement('button');
  b.className = 'btn';
  b.textContent = t.n;
  b.onclick = () => showTicket(t.n);
  grid.appendChild(b);
});

// Build ticket HTML
const container = document.getElementById('tickets-container');
DATA.forEach(t => {
  const div = document.createElement('div');
  div.className = 'ticket';
  div.id = 'ticket-' + t.n;
  let html = `<div class="ticket-title">БИЛЕТ №${t.n}</div>`;
  t.qs.forEach(q => {
    html += `<div class="q-block"><div class="q-title">${q.title}</div><div class="q-text">${q.text.replace(/\n/g,'<br>')}</div></div>`;
  });
  html += `<div class="practice"><div class="q-title">${t.practice.title}</div><div class="q-text">${t.practice.text.replace(/\n/g,'<br>')}</div></div>`;
  div.innerHTML = html;
  container.appendChild(div);
});

let current = null;
function showTicket(n) {
  if (current !== null) {
    document.getElementById('ticket-'+current).classList.remove('visible');
    document.querySelector('.btn.active')?.classList.remove('active');
  }
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('ticket-'+n).classList.add('visible');
  document.querySelectorAll('.btn')[n-1].classList.add('active');
  current = n;
  window.scrollTo(0,0);
  closeSR();
}

// Search
const searchEl = document.getElementById('search');
const srEl = document.getElementById('search-results');

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  if (q.length < 2) { closeSR(); return; }
  const hits = [];
  DATA.forEach(t => {
    t.qs.forEach(question => {
      if (question.title.toLowerCase().includes(q) || question.text.toLowerCase().includes(q)) {
        hits.push({ n: t.n, title: question.title });
      }
    });
    if (t.practice.title.toLowerCase().includes(q) || t.practice.text.toLowerCase().includes(q)) {
      hits.push({ n: t.n, title: t.practice.title });
    }
  });
  if (!hits.length) { srEl.innerHTML = '<div class="sr-item" style="color:#666">Ничего не найдено</div>'; srEl.style.display='block'; return; }
  const unique = [];
  const seen = new Set();
  hits.forEach(h => { if (!seen.has(h.n+h.title)) { seen.add(h.n+h.title); unique.push(h); } });
  srEl.innerHTML = unique.slice(0,10).map(h =>
    `<div class="sr-item" onclick="showTicket(${h.n});searchEl.value=''">
      <span class="sr-num">Билет №${h.n}</span><span class="sr-q">${h.title.substring(0,70)}...</span>
    </div>`
  ).join('');
  srEl.style.display = 'block';
});

function closeSR() { srEl.style.display = 'none'; }
document.addEventListener('click', e => { if (!e.target.closest('#top')) closeSR(); });
</script>
